<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Widget Toggle</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f9f9f9;
      }
      button {
        padding: 10px;
        background-color: #2ecc40; /* Default to active green */
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <button id="toggleWidget">Activate Widget</button>
    <script src="popup.js"></script>
  </body>
</html>
